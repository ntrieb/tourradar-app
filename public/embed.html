<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TourRadar Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0D2847;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .frame-wrap {
    width: 100%;
    max-width: 480px;
    height: 100%;
    max-height: 900px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.35);
  }
  .frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Tablet */
  @media (min-width: 768px) {
    body { padding: 24px; }
    .frame-wrap {
      max-width: 520px;
    }
  }

  /* Desktop */
  @media (min-width: 1024px) {
    body { padding: 32px; }
    .frame-wrap {
      max-width: 560px;
      max-height: 920px;
    }
  }

  /* Mobile: full bleed */
  @media (max-width: 500px) {
    body { padding: 0; }
    .frame-wrap {
      max-width: 100%;
      max-height: 100%;
      border-radius: 0;
      box-shadow: none;
    }
  }
</style>
</head>
<body>

<div class="frame-wrap">
  <iframe src="https://tourradar-app.vercel.app/chat.html" allow="clipboard-write"></iframe>
</div>

</body>
</html>
