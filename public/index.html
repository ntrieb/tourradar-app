<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Europe Tours — TourRadar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }

    .hero { background: linear-gradient(160deg, #0f2d4a 0%, #1a5276 50%, #1a6e96 100%); }

    .card { transition: transform .22s ease, box-shadow .22s ease; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 24px 48px rgba(0,0,0,.18); }

    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
            padding: 3px 10px; border-radius: 99px; }
    .pill-blue { background: #dbeafe; color: #1d4ed8; }
    .pill-green { background: #dcfce7; color: #15803d; }
    .pill-orange { background: #ffedd5; color: #c2410c; }

    .rating-bar-wrap { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
    .rating-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #f59e0b, #f97316); }

    .filter-btn { padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
                  border: 2px solid transparent; cursor: pointer; transition: all .15s; }
    .filter-btn.active { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .filter-btn:not(.active) { background: white; color: #374151; border-color: #d1d5db; }
    .filter-btn:not(.active):hover { border-color: #1d4ed8; color: #1d4ed8; }

    .detail-modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center;
                    justify-content: center; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); }
    .detail-box { background: white; border-radius: 20px; max-width: 700px; width: 95%;
                  max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 80px rgba(0,0,0,.3); }

    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ── HERO ─────────────────────────────────────────────────────────── -->
<header class="hero text-white">
  <div class="max-w-6xl mx-auto px-6 pt-14 pb-12 text-center">
    <span class="inline-flex items-center gap-2 text-xs font-semibold bg-white/10 px-4 py-1.5 rounded-full mb-5 uppercase tracking-wider">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064"/>
      </svg>
      Live data via TourRadar MCP
    </span>
    <h1 class="text-5xl sm:text-6xl font-black tracking-tight mb-3">Europe Tours</h1>
    <p class="text-blue-200 text-lg mb-10 max-w-xl mx-auto">Real-time search powered by TourRadar's AI</p>

    <!-- Search -->
    <div class="flex gap-3 max-w-2xl mx-auto">
      <input id="searchInput" type="text" placeholder="e.g. Best of Europe, 10-day Italy, scenic Balkans…"
        class="flex-1 px-5 py-3.5 rounded-xl text-gray-800 text-sm font-medium shadow-xl outline-none
               border-2 border-transparent focus:border-blue-400" />
      <button onclick="doSearch()" id="searchBtn"
        class="bg-orange-500 hover:bg-orange-600 active:scale-95 transition px-7 py-3.5 rounded-xl font-bold
               text-sm shadow-xl whitespace-nowrap flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        Search
      </button>
    </div>

    <!-- Quick filters -->
    <div class="flex flex-wrap justify-center gap-2 mt-5" id="quickFilters">
      <button onclick="quickSearch('best highlights of Europe')" class="filter-btn active" data-q="best highlights of Europe">Best of Europe</button>
      <button onclick="quickSearch('Italy tour')" class="filter-btn" data-q="Italy tour">Italy</button>
      <button onclick="quickSearch('France tour')" class="filter-btn" data-q="France tour">France</button>
      <button onclick="quickSearch('Greece islands')" class="filter-btn" data-q="Greece islands">Greece</button>
      <button onclick="quickSearch('Balkans Eastern Europe')" class="filter-btn" data-q="Balkans Eastern Europe">Balkans</button>
      <button onclick="quickSearch('Scandinavia Nordic fjords')" class="filter-btn" data-q="Scandinavia Nordic fjords">Nordic</button>
      <button onclick="quickSearch('Spain Portugal')" class="filter-btn" data-q="Spain Portugal">Iberia</button>
    </div>
  </div>
</header>

<!-- ── CONTENT ────────────────────────────────────────────────────────── -->
<main class="max-w-6xl mx-auto px-6 py-10">

  <!-- Status -->
  <div id="status" class="hidden mb-6 px-4 py-3 rounded-xl text-sm font-medium"></div>

  <!-- Results header -->
  <div id="resultsHeader" class="hidden flex items-center justify-between mb-7">
    <div>
      <h2 id="resultsTitle" class="text-2xl font-bold text-gray-900"></h2>
      <p id="resultsSubtitle" class="text-gray-500 text-sm mt-0.5"></p>
    </div>
    <div id="sortWrap" class="hidden sm:block">
      <select id="sortSelect" onchange="sortAndRender()" class="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white text-gray-700 font-medium">
        <option value="overall">Sort: Overall rating</option>
        <option value="reviews">Sort: Most reviewed</option>
        <option value="guide">Sort: Guide rating</option>
      </select>
    </div>
  </div>

  <!-- Skeletons -->
  <div id="skeletons" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm sm:block hidden"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm sm:block hidden"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm lg:block hidden"><div class="skeleton h-48 w-full rounded-none"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div><div class="skeleton h-3 w-full"></div><div class="skeleton h-8 w-full mt-2"></div></div></div>
  </div>

  <!-- Tour grid -->
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- Empty / error -->
  <div id="empty" class="hidden text-center py-24">
    <div class="text-6xl mb-4">🗺️</div>
    <h3 id="emptyTitle" class="text-xl font-bold text-gray-700 mb-2">No tours found</h3>
    <p id="emptyMsg" class="text-gray-500 text-sm"></p>
  </div>

</main>

<!-- ── DETAIL MODAL ───────────────────────────────────────────────────── -->
<div id="modal" class="detail-modal hidden" onclick="if(event.target===this)closeModal()">
  <div class="detail-box">
    <div id="modalContent"></div>
  </div>
</div>

<footer class="text-center text-gray-400 text-xs py-6 border-t border-gray-100 mt-4">
  Powered by <a href="https://www.tourradar.com" target="_blank" class="text-blue-500 hover:underline">TourRadar MCP</a>
  &middot; Built with Claude Code
</footer>

<script>
// ── MCP client ────────────────────────────────────────────────────────
const MCP_URL = 'https://ai.tourradar.com/mcp/main';
let callId = 1;

async function mcpCall(method, params) {
  const res = await fetch(MCP_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json, text/event-stream'
    },
    body: JSON.stringify({ jsonrpc: '2.0', id: callId++, method, params })
  });

  const text = await res.text();
  // Parse SSE: find "data: {...}" line
  for (const line of text.split('\n')) {
    if (line.startsWith('data: ')) {
      const parsed = JSON.parse(line.slice(6));
      if (parsed.error) throw new Error(parsed.error.message || JSON.stringify(parsed.error));
      return parsed.result;
    }
  }
  throw new Error('No data in MCP response');
}

async function searchTours(textSearch) {
  return mcpCall('tools/call', {
    name: 'vertex-tour-search',
    arguments: {
      textSearch,
      display_mode: 'listing',
      countries: {
        values: ['FR','IT','ES','DE','GR','PT','AT','GB','NL','CH','BE','CZ','PL','HR','HU','RO','IS','NO','SE'],
        operator: 'OR'
      }
    }
  });
}

async function getTourDetails(tourId) {
  return mcpCall('tools/call', {
    name: 'b2b-tour-details',
    arguments: { tourId }
  });
}

// ── State ─────────────────────────────────────────────────────────────
let allTours = [];
let currentQuery = '';

// ── Render ────────────────────────────────────────────────────────────
function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function starsHtml(rating) {
  if (!rating) return '';
  const r = Math.round(rating * 2) / 2;
  let s = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= r) s += '<span class="text-amber-400">★</span>';
    else if (i - 0.5 === r) s += '<span class="text-amber-300">★</span>';
    else s += '<span class="text-gray-200">★</span>';
  }
  return s;
}

function ratingColor(v) {
  if (v >= 4.7) return 'text-green-600';
  if (v >= 4.0) return 'text-blue-600';
  return 'text-orange-500';
}

function renderCard(tour) {
  const img = tour.image?.[0]?.url || '';
  const rating = tour.ratings?.overall || 0;
  const guide  = tour.ratings?.guide  || 0;
  const desc = stripHtml(tour.description || '').slice(0, 120) + '…';
  const city = tour.start_city?.city_name || '';

  return `
  <div class="card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col cursor-pointer"
       onclick="openDetail(${tour.tour_id})">
    <div class="relative">
      <img src="${img}" alt="${tour.tour_name}"
           class="w-full h-48 object-cover"
           onerror="this.src='https://images.unsplash.com/photo-1499856871958-5b9357976b82?w=600&q=70'"/>
      ${rating >= 4.5 ? `<span class="absolute top-3 left-3 pill pill-orange">⭐ Top Rated</span>` : ''}
      <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
      ${city ? `<span class="absolute bottom-3 left-3 text-white text-xs font-semibold bg-black/40 px-2 py-0.5 rounded-full">✈ from ${city}</span>` : ''}
    </div>

    <div class="p-5 flex flex-col flex-1">
      <p class="text-xs font-semibold text-blue-600 mb-1 uppercase tracking-wide">${tour.operator?.name || ''}</p>
      <h3 class="font-bold text-gray-900 text-base leading-snug mb-2 line-clamp-2">${tour.tour_name}</h3>
      <p class="text-gray-500 text-xs leading-relaxed mb-3 line-clamp-3">${desc}</p>

      <div class="mt-auto">
        ${rating ? `
        <div class="flex items-center gap-2 mb-3">
          <div class="flex text-sm">${starsHtml(rating)}</div>
          <span class="font-bold text-sm ${ratingColor(rating)}">${rating.toFixed(1)}</span>
          <span class="text-gray-400 text-xs">(${tour.reviews_count?.toLocaleString() || 0} reviews)</span>
        </div>` : ''}

        <div class="flex items-center justify-between pt-3 border-t border-gray-100">
          <div class="flex gap-2">
            ${guide ? `<span class="pill pill-green">Guide ${guide.toFixed(1)}</span>` : ''}
            ${tour.ratings?.transport ? `<span class="pill pill-blue">Transport ${tour.ratings.transport.toFixed(1)}</span>` : ''}
          </div>
          <span class="text-blue-600 font-semibold text-xs hover:underline">View →</span>
        </div>
      </div>
    </div>
  </div>`;
}

function sortAndRender() {
  const by = document.getElementById('sortSelect').value;
  const sorted = [...allTours].sort((a, b) => {
    const ra = a.ratings || {}, rb = b.ratings || {};
    if (by === 'overall') return (rb.overall || 0) - (ra.overall || 0);
    if (by === 'reviews') return (b.reviews_count || 0) - (a.reviews_count || 0);
    if (by === 'guide')   return (rb.guide || 0) - (ra.guide || 0);
    return 0;
  });
  document.getElementById('grid').innerHTML = sorted.map(renderCard).join('');
}

// ── Detail modal ──────────────────────────────────────────────────────
async function openDetail(tourId) {
  const tour = allTours.find(t => t.tour_id === tourId);
  if (!tour) return;

  // Immediately show skeleton modal
  document.getElementById('modalContent').innerHTML = `
    <div class="p-8 space-y-4">
      <div class="skeleton h-56 w-full rounded-xl"></div>
      <div class="skeleton h-6 w-2/3"></div>
      <div class="skeleton h-4 w-1/2"></div>
      <div class="skeleton h-20 w-full"></div>
    </div>`;
  document.getElementById('modal').classList.remove('hidden');

  // Fetch full details for price + duration
  let details = null;
  try {
    const res = await getTourDetails(tourId);
    details = res?.structuredContent?.tour || null;
  } catch { /* optional enhancement */ }

  const img = tour.image?.[0]?.url || '';
  const rating = tour.ratings || {};
  const desc = stripHtml(tour.description || '');
  const duration = details?.tour_length_days;
  const price = details?.prices?.departures?.[0]?.price_promotion
              || details?.prices?.departures?.[0]?.price_base
              || null;

  const ratingRows = [
    ['Overall',       rating.overall],
    ['Guide',         rating.guide],
    ['Transport',     rating.transport],
    ['Itinerary',     rating.itinerary],
    ['Accommodation', rating.accommodation],
    ['Food',          rating.food],
  ].filter(([,v]) => v);

  document.getElementById('modalContent').innerHTML = `
    <div>
      <div class="relative">
        <img src="${img}" class="w-full h-56 object-cover rounded-t-2xl"
             onerror="this.src='https://images.unsplash.com/photo-1499856871958-5b9357976b82?w=700&q=70'"/>
        <button onclick="closeModal()" class="absolute top-3 right-3 bg-black/50 hover:bg-black/70 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm transition">✕</button>
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent rounded-t-2xl"></div>
        <div class="absolute bottom-4 left-5 text-white">
          <p class="text-xs font-semibold opacity-80 uppercase tracking-wide">${tour.operator?.name || ''}</p>
          <h2 class="text-xl font-bold leading-tight">${tour.tour_name}</h2>
        </div>
      </div>

      <div class="p-6">
        <!-- Stats row -->
        <div class="flex flex-wrap gap-3 mb-5">
          ${duration ? `<div class="flex-1 min-w-[100px] bg-blue-50 rounded-xl p-3 text-center"><div class="text-2xl font-black text-blue-700">${duration}</div><div class="text-xs text-blue-500 font-medium mt-0.5">Days</div></div>` : ''}
          ${rating.overall ? `<div class="flex-1 min-w-[100px] bg-amber-50 rounded-xl p-3 text-center"><div class="text-2xl font-black text-amber-600">${rating.overall.toFixed(1)}</div><div class="text-xs text-amber-500 font-medium mt-0.5">Overall</div></div>` : ''}
          ${tour.reviews_count ? `<div class="flex-1 min-w-[100px] bg-green-50 rounded-xl p-3 text-center"><div class="text-2xl font-black text-green-600">${tour.reviews_count}</div><div class="text-xs text-green-500 font-medium mt-0.5">Reviews</div></div>` : ''}
          ${price ? `<div class="flex-1 min-w-[100px] bg-purple-50 rounded-xl p-3 text-center"><div class="text-xl font-black text-purple-700">$${Math.round(price).toLocaleString()}</div><div class="text-xs text-purple-500 font-medium mt-0.5">From</div></div>` : ''}
        </div>

        <!-- Description -->
        <p class="text-gray-600 text-sm leading-relaxed mb-5">${desc}</p>

        <!-- Ratings breakdown -->
        ${ratingRows.length ? `
        <div class="mb-6">
          <h4 class="font-bold text-gray-900 text-sm mb-3">Ratings Breakdown</h4>
          <div class="space-y-2">
            ${ratingRows.map(([label, val]) => `
            <div class="flex items-center gap-3">
              <span class="text-xs text-gray-500 w-28 shrink-0">${label}</span>
              <div class="rating-bar-wrap flex-1"><div class="rating-bar" style="width:${(val/5)*100}%"></div></div>
              <span class="text-xs font-semibold text-gray-700 w-8 text-right">${val.toFixed(1)}</span>
            </div>`).join('')}
          </div>
        </div>` : ''}

        <a href="${tour.tour_url}" target="_blank"
           class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition text-sm">
          View on TourRadar →
        </a>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

// ── Search orchestration ──────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  const cls = {
    info:    'bg-blue-50 text-blue-700 border border-blue-200',
    success: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
    error:   'bg-red-50 text-red-700 border border-red-200',
  }[type] || 'bg-gray-100 text-gray-700';
  el.className = `mb-6 px-4 py-3 rounded-xl text-sm font-medium ${cls}`;
  el.textContent = msg;
  el.classList.remove('hidden');
}

function setLoading(on) {
  document.getElementById('skeletons').classList.toggle('hidden', !on);
  if (on) document.getElementById('grid').innerHTML = '';
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim() || currentQuery || 'best highlights of Europe';
  currentQuery = q;
  await runSearch(q);
}

async function quickSearch(q) {
  currentQuery = q;
  document.getElementById('searchInput').value = '';

  // Update active filter
  document.querySelectorAll('#quickFilters .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.q === q);
  });

  await runSearch(q);
}

async function runSearch(query) {
  document.getElementById('empty').classList.add('hidden');
  document.getElementById('resultsHeader').classList.add('hidden');
  document.getElementById('status').classList.add('hidden');
  document.getElementById('sortWrap').classList.add('hidden');
  setLoading(true);

  try {
    const result = await searchTours(query);
    setLoading(false);

    const sc = result?.structuredContent;
    const tours = sc?.tours || [];

    if (!tours.length) {
      document.getElementById('emptyTitle').textContent = 'No tours found';
      document.getElementById('emptyMsg').textContent = `Try a different search — e.g. "Italy highlights" or "Paris to Rome"`;
      document.getElementById('empty').classList.remove('hidden');
      return;
    }

    allTours = tours;
    setStatus(`✓ Found ${sc.totalCount || tours.length} tours via TourRadar MCP`, 'success');
    document.getElementById('resultsTitle').textContent = query.charAt(0).toUpperCase() + query.slice(1);
    document.getElementById('resultsSubtitle').textContent = `${tours.length} tours loaded — click any card for details`;
    document.getElementById('resultsHeader').classList.remove('hidden');
    document.getElementById('sortWrap').classList.remove('hidden');

    sortAndRender();
  } catch (err) {
    setLoading(false);
    setStatus(`Error: ${err.message}`, 'error');
    document.getElementById('emptyTitle').textContent = 'Something went wrong';
    document.getElementById('emptyMsg').textContent = err.message;
    document.getElementById('empty').classList.remove('hidden');
  }
}

// keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// Auto-load
quickSearch('best highlights of Europe');
</script>
</body>
</html>
